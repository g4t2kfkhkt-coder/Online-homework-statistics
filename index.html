<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>交作业统计（14 班 / 9 班）</title>

  <style>
    /* =========================
       ✅ Bilibili 粉白风格主题
       ========================= */
    :root{
      --bg:#f6f7f9;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:rgba(0,0,0,.08);

      --primary:#fb7299;
      --primary-soft:rgba(251,114,153,.18);

      --good:#22c55e;
      --circle:#60a5fa;
      --tri:#a78bfa;
      --blank:#9ca3af;
      --danger:#ef4444;

      --shadow:0 8px 24px rgba(0,0,0,.08);
      --radius:16px;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 10% 0%, #ffe4ec 0%, rgba(255,228,236,0) 60%),
        radial-gradient(1000px 500px at 90% 10%, #e8f1ff 0%, rgba(232,241,255,0) 55%),
        var(--bg);
      min-height:100vh;
    }

    .wrap{max-width:1200px; margin:0 auto; padding:16px;}

    header{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
    }

    .left,.right{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}

    .brand{display:flex; flex-direction:column; gap:4px;}
    .brand h1{margin:0; font-size:18px;}
    .brand .sub{font-size:13px; color:var(--muted); line-height:1.5}

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px;
    }

    /* Tabs */
    .tabs{
      display:flex;
      gap:6px;
      padding:6px;
      border-radius:999px;
      background:#f1f2f3;
      border:1px solid var(--line);
    }
    .tab{
      border:none;
      background:transparent;
      padding:8px 14px;
      border-radius:999px;
      font-weight:800;
      cursor:pointer;
      color:var(--muted);
    }
    .tab.active{
      background:var(--primary-soft);
      color:var(--primary);
    }

    input,select,textarea{
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 12px;
      font-size:14px;
      color:var(--text);
      outline:none;
    }

    button{
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 12px;
      font-weight:700;
      cursor:pointer;
    }
    button:hover{background:#f5f6f7}

    button.primary{
      background:var(--primary-soft);
      border-color:var(--primary);
      color:var(--primary);
    }
    button.primary:hover{background:rgba(251,114,153,.28)}

    button.danger{
      background:rgba(239,68,68,.12);
      border-color:rgba(239,68,68,.4);
      color:#ef4444;
    }

    button.tiny{padding:6px 10px; font-size:12px;}

    .grid4{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }
    @media(min-width:900px){
      .grid4{grid-template-columns:1fr 1fr}
    }

    .panelTitle{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
    }
    .panelTitle .name{font-weight:900}
    .panelTitle .hint{font-size:13px; color:var(--muted)}

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      border-radius:14px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#fff;
    }
    thead th{
      background:#f5f6f7;
      font-size:12px;
      color:var(--muted);
      padding:8px 6px;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
    }
    tbody td{
      padding:8px 6px;
      text-align:center;
      border-bottom:1px solid rgba(0,0,0,.05);
    }
    tbody tr:last-child td{border-bottom:none}

    .id{
      font-family:var(--mono);
      font-size:13px;
      color:#374151;
    }

    .status{
      font-size:18px;
      font-weight:900;
      padding:8px 0;
      border-radius:10px;
      cursor:pointer;
      border:1px dashed rgba(0,0,0,.15);
      background:#f9fafb;
      user-select:none;
    }
    .status:hover{background:#f1f2f3}

    .s-blank{color:var(--blank)}
    .s-check{color:var(--good)}
    .s-circle{color:var(--circle)}
    .s-tri{color:var(--tri)}

    .footerLegend{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:space-between;
      align-items:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:#f1f2f3;
      border:1px solid rgba(0,0,0,.06);
      font-size:12px;
      color:var(--muted);
    }

    .legendRow{display:flex; gap:8px; flex-wrap:wrap}
    .small{font-size:12px; color:var(--muted)}

    dialog{
      border:none;
      border-radius:16px;
      padding:0;
      background:transparent;
      width:min(760px,96vw);
    }
    dialog .card{margin:0}

    textarea{
      min-height:120px;
      resize:vertical;
      font-family:var(--mono);
      font-size:12px;
    }
  </style>
</head>


<body>
  <div class="wrap">
    <header>
      <div class="left">
        <div class="brand">
          <h1>交作业统计（两班 / 按日期）</h1>
          <div class="sub">点击“作业状态”格：空白 → ✓ → ○ → △ → 空白（循环）。表名可点 ✎ 动态改名并保存（按日期保存，不联动其他日期）。</div>
        </div>

        <div class="tabs" role="tablist" aria-label="班级切换">
          <button class="tab active" data-class="class14" role="tab">14 班</button>
          <button class="tab" data-class="class9" role="tab">9 班</button>
        </div>
      </div>

      <div class="right card">
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
          <div>
            <div class="small">日期</div>
            <input id="date" type="date"/>
          </div>
          <div>
            <div class="small">历史日期（当前班）</div>
            <select id="historySelect">
              <option value="">（选择已有记录日期）</option>
            </select>
          </div>
          <button id="exportJson" class="tiny">导出 JSON</button>
          <button id="importJson" class="tiny">导入 JSON</button>
          <button id="resetTitles" class="tiny">恢复默认表名 (当日)</button>
          <button id="clearDay" class="tiny danger">清空当日 (当前班)</button>
        </div>
      </div>
    </header>

    <div class="grid4">
      <div class="card">
        <div class="panelTitle">
          <div class="name">左上</div>
          <div style="display:flex; align-items:center; gap:8px;">
            <div class="hint" id="titleA">作业 1</div>
            <button type="button" class="tiny" data-edit-title="A" title="修改本班该日期该表的名称">✎</button>
          </div>
        </div>
        <div id="panelA"></div>
      </div>

      <div class="card">
        <div class="panelTitle">
          <div class="name">右上</div>
          <div style="display:flex; align-items:center; gap:8px;">
            <div class="hint" id="titleB">作业 2</div>
            <button type="button" class="tiny" data-edit-title="B" title="修改本班该日期该表的名称">✎</button>
          </div>
        </div>
        <div id="panelB"></div>
      </div>

      <div class="card">
        <div class="panelTitle">
          <div class="name">左下</div>
          <div style="display:flex; align-items:center; gap:8px;">
            <div class="hint" id="titleC">作业 3</div>
            <button type="button" class="tiny" data-edit-title="C" title="修改本班该日期该表的名称">✎</button>
          </div>
        </div>
        <div id="panelC"></div>
      </div>

      <div class="card">
        <div class="panelTitle">
          <div class="name">右下</div>
          <div style="display:flex; align-items:center; gap:8px;">
            <div class="hint" id="titleD">作业 4</div>
            <button type="button" class="tiny" data-edit-title="D" title="修改本班该日期该表的名称">✎</button>
          </div>
        </div>
        <div id="panelD"></div>
      </div>
    </div>

    <div class="footerLegend card">
      <div class="legendRow">
        <span class="pill"><b class="s-blank">空白</b><span class="sep">|</span>未交</span>
        <span class="pill"><b class="s-check">✓</b><span class="sep">|</span>已交</span>
        <span class="pill"><b class="s-circle">○</b><span class="sep">|</span>优秀（你也可按习惯理解）</span>
        <span class="pill"><b class="s-tri">△</b><span class="sep">|</span>补交（你也可按习惯理解）</span>
      </div>
      <div class="small">提示：数据保存在本机浏览器（localStorage），刷新/关闭浏览器不会丢；建议定期导出 JSON 备份。</div>
    </div>

    <!-- 导入 JSON 弹窗 -->
    <dialog id="dlgImport">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
          <h2 style="margin:0; font-size:16px;">导入 JSON（合并到现有数据）</h2>
          <button id="closeImport">关闭</button>
        </div>
        <div class="small" style="margin-top:6px; line-height:1.5;">
          把之前导出的 JSON 粘贴进来。导入会<b>合并</b>到现有数据（同一天同学号以导入为准）。
        </div>
        <div style="margin-top:10px;">
          <textarea id="importBox" placeholder='粘贴 JSON...'></textarea>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
          <button id="doImport" class="primary">导入并刷新</button>
        </div>
      </div>
    </dialog>

  </div>

  <script>
    /***********************
     * 数据结构（localStorage）
     * key: hw_tracker_v4
     * store = {
     *   classes: {
     *     class14: { dates: { "YYYY-MM-DD": {A:{},B:{},C:{},D:{}, titles:{A,B,C,D}} } },
     *     class9:  { dates: { ... } }
     *   }
     * }
     ************************/
    const STORE_KEY = "hw_tracker_v4";
    const STUDENTS = Array.from({length:50}, (_,i)=> String(i+1)); // 1..50
    const SHEETS = ["A","B","C","D"]; // 四个表：左上/右上/左下/右下
    const CYCLE = ["", "✓", "○", "△"]; // 空白 → ✓ → ○ → △ → 空白
    const CLASS_LABEL = { class14:"14 班", class9:"9 班" };

    // 默认表名
    const DEFAULT_TITLES = { A:"作业 1", B:"作业 2", C:"作业 3", D:"作业 4" };

    const elDate = document.getElementById("date");
    const elHistory = document.getElementById("historySelect");
    const tabs = document.querySelectorAll(".tab");

    const titleEls = {
      A: document.getElementById("titleA"),
      B: document.getElementById("titleB"),
      C: document.getElementById("titleC"),
      D: document.getElementById("titleD")
    };

    const panels = {
      A: document.getElementById("panelA"),
      B: document.getElementById("panelB"),
      C: document.getElementById("panelC"),
      D: document.getElementById("panelD")
    };

    function todayISO(){
      const d = new Date();
      const off = d.getTimezoneOffset();
      const local = new Date(d.getTime() - off*60000);
      return local.toISOString().slice(0,10);
    }

    function loadStore(){
      try{
        const raw = localStorage.getItem(STORE_KEY);
        return raw ? JSON.parse(raw) : null;
      }catch(e){ return null; }
    }
    function saveStore(store){
      localStorage.setItem(STORE_KEY, JSON.stringify(store));
    }
    function ensureStore(){
      let s = loadStore();
      if(!s){
        s = { classes: { class14:{dates:{}}, class9:{dates:{}} } };
        saveStore(s);
      }
      if(!s.classes) s.classes = { class14:{dates:{}}, class9:{dates:{}} };
      for(const cls of ["class14","class9"]){
        if(!s.classes[cls]) s.classes[cls] = {dates:{}};
        if(!s.classes[cls].dates) s.classes[cls].dates = {};
        // 兼容旧数据：如果以前有 sheetTitles 也不强制删除（不再使用）
      }
      return s;
    }

    let store = ensureStore();
    let currentClass = "class14";

    function getDay(){
      return elDate.value || todayISO();
    }

    // ✅ 关键：按“班级 + 日期”确保记录存在，并在每天记录里存 titles
    function ensureDayRecord(cls, day){
      const c = store.classes[cls];
      if(!c.dates[day]){
        c.dates[day] = { A:{}, B:{}, C:{}, D:{}, titles:{...DEFAULT_TITLES} };
      }else{
        for(const k of SHEETS){
          if(!c.dates[day][k]) c.dates[day][k] = {};
        }
        if(!c.dates[day].titles) c.dates[day].titles = {...DEFAULT_TITLES};
        for(const k of SHEETS){
          if(typeof c.dates[day].titles[k] !== "string"){
            c.dates[day].titles[k] = DEFAULT_TITLES[k];
          }
        }
      }
      return c.dates[day];
    }

    function getStatusIndex(cls, day, sheet, studentId){
      const rec = ensureDayRecord(cls, day);
      const v = rec[sheet][studentId];
      return (typeof v === "number") ? v : 0; // 0=空白
    }

    function setStatusIndex(cls, day, sheet, studentId, idx){
      const rec = ensureDayRecord(cls, day);
      rec[sheet][studentId] = idx;
      saveStore(store);
    }

    function clearDay(cls, day){
      store.classes[cls].dates[day] = { A:{}, B:{}, C:{}, D:{}, titles:{...DEFAULT_TITLES} };
      saveStore(store);
    }

    function resetTitlesForDay(cls, day){
      const rec = ensureDayRecord(cls, day);
      rec.titles = { ...DEFAULT_TITLES };
      saveStore(store);
    }

    function buildTableHTML(cls, day, sheet){
      // ✅ 修改处：将 max-height 从 520px 调整为 850px，确保 10 行数据无需滚动
      let html = `<div style="overflow:auto; max-height:850px;">`;
      html += `<table aria-label="${CLASS_LABEL[cls]} ${day} 表${sheet}">`;
      html += `<thead><tr>`;
      for(let g=0; g<5; g++){
        html += `<th>学号</th><th>作业状态</th>`;
      }
      html += `</tr></thead><tbody>`;

      for(let r=0; r<10; r++){
        html += `<tr>`;
        for(let g=0; g<5; g++){
          const id = String(r + 1 + g*10);
          const idx = getStatusIndex(cls, day, sheet, id);
          const icon = CYCLE[idx] || "";
          const clsName = idx===0 ? "s-blank" : (idx===1 ? "s-check" : (idx===2 ? "s-circle" : "s-tri"));
          html += `<td class="id">${id}</td>`;
          html += `<td>
                    <div class="status ${clsName}"
                      data-class="${cls}"
                      data-date="${day}"
                      data-sheet="${sheet}"
                      data-student="${id}"
                      data-idx="${idx}"
                      title="点击切换：空白→✓→○→△"
                      role="button" aria-label="学号${id} 状态">
                      ${icon}
                    </div>
                  </td>`;
        }
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;
      return html;
    }

    function render(){
      store = ensureStore();
      const day = getDay();

      // ✅ 表名从“当天记录 titles"读取
      const dayRec = ensureDayRecord(currentClass, day);
      const titles = dayRec.titles || DEFAULT_TITLES;
      for(const k of SHEETS){
        titleEls[k].textContent = titles[k] || DEFAULT_TITLES[k];
      }

      for(const sheet of SHEETS){
        panels[sheet].innerHTML = buildTableHTML(currentClass, day, sheet);
      }

      const days = Object.keys(store.classes[currentClass].dates || {}).sort((a,b)=> b.localeCompare(a));
      const keep = elHistory.value;
      elHistory.innerHTML = `<option value="">（选择已有记录日期）</option>` + days.map(d=>`<option value="${d}">${d}</option>`).join("");
      if(keep && days.includes(keep)) elHistory.value = keep;
    }

    // ===== 班级切换 =====
    tabs.forEach(btn=>{
      btn.addEventListener("click", ()=>{
        tabs.forEach(x=>x.classList.remove("active"));
        btn.classList.add("active");
        currentClass = btn.dataset.class;
        render();
      });
    });

    // ===== 日期与历史 =====
    elDate.value = todayISO();
    elDate.addEventListener("change", ()=> render());
    elHistory.addEventListener("change", ()=>{
      if(elHistory.value){
        elDate.value = elHistory.value;
        render();
      }
    });

    // ===== 点击状态格（事件委托）=====
    document.addEventListener("click", (e)=>{
      const t = e.target.closest?.(".status");
      if(!t) return;
      const cls = t.dataset.class;
      const day = t.dataset.date;
      const sheet = t.dataset.sheet;
      const student = t.dataset.student;
      const idx = parseInt(t.dataset.idx || "0", 10);
      const next = (idx + 1) % CYCLE.length;
      setStatusIndex(cls, day, sheet, student, next);

      t.dataset.idx = String(next);
      t.textContent = CYCLE[next];
      t.classList.remove("s-blank","s-check","s-circle","s-tri");
      t.classList.add(next===0 ? "s-blank" : next===1 ? "s-check" : next===2 ? "s-circle" : "s-tri");
    });

    // ===== 动态改表名（按“当天 + 班级”独立保存）=====
    document.addEventListener("click", (e)=>{
      const btn = e.target.closest?.("[data-edit-title]");
      if(!btn) return;
      const sheet = btn.getAttribute("data-edit-title");
      const day = getDay();

      const dayRec = ensureDayRecord(currentClass, day);
      const titles = dayRec.titles || (dayRec.titles = {...DEFAULT_TITLES});
      const current = titles[sheet] || DEFAULT_TITLES[sheet];

      const next = prompt(`请输入【${CLASS_LABEL[currentClass]}】${day} 的表名（${sheet}）：`, current);
      if(next === null) return;
      const trimmed = next.trim();
      titles[sheet] = trimmed ? trimmed : DEFAULT_TITLES[sheet];
      saveStore(store);
      render();
    });

    // ===== 清空当日（当前班）=====
    document.getElementById("clearDay").addEventListener("click", ()=>{
      const day = getDay();
      clearDay(currentClass, day);
      render();
    });

    // ===== 恢复默认表名（当前班的当日）=====
    document.getElementById("resetTitles").addEventListener("click", ()=>{
      const day = getDay();
      resetTitlesForDay(currentClass, day);
      render();
    });

    // ===== 导出/导入 JSON =====
    function download(filename, content, type="application/json;charset=utf-8"){
      const blob = new Blob([content], {type});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById("exportJson").addEventListener("click", ()=>{
      const payload = ensureStore();
      download(`作业统计_两班_全部日期.json`, JSON.stringify(payload, null, 2));
    });

    const dlg = document.getElementById("dlgImport");
    document.getElementById("importJson").addEventListener("click", ()=>{
      document.getElementById("importBox").value = "";
      dlg.showModal();
    });
    document.getElementById("closeImport").addEventListener("click", ()=> dlg.close());

    document.getElementById("doImport").addEventListener("click", ()=>{
      try{
        const text = document.getElementById("importBox").value.trim();
        if(!text) return;
        const incoming = JSON.parse(text);

        const base = ensureStore();

        if(incoming?.classes){
          for(const cls of ["class14","class9"]){
            const inC = incoming.classes[cls];
            if(!inC) continue;

            if(inC.dates){
              for(const day of Object.keys(inC.dates)){
                if(!base.classes[cls].dates[day]) base.classes[cls].dates[day] = {A:{},B:{},C:{},D:{}, titles:{...DEFAULT_TITLES}};
                const dayRec = inC.dates[day] || {};

                // ✅ 合并当日 titles
                if(dayRec.titles){
                  if(!base.classes[cls].dates[day].titles) base.classes[cls].dates[day].titles = {...DEFAULT_TITLES};
                  base.classes[cls].dates[day].titles = {
                    ...base.classes[cls].dates[day].titles,
                    ...dayRec.titles
                  };
                  for(const k of SHEETS){
                    if(typeof base.classes[cls].dates[day].titles[k] !== "string"){
                      base.classes[cls].dates[day].titles[k] = DEFAULT_TITLES[k];
                    }
                  }
                }

                // 合并状态数据
                for(const sheet of SHEETS){
                  if(!base.classes[cls].dates[day][sheet]) base.classes[cls].dates[day][sheet] = {};
                  const inSheet = dayRec[sheet] || {};
                  for(const sid of Object.keys(inSheet)){
                    const v = inSheet[sid];
                    if(typeof v === "number") base.classes[cls].dates[day][sheet][sid] = v;
                  }
                }
              }
            }
          }
        }

        store = base;
        saveStore(store);
        dlg.close();
        render();
      }catch(err){
        alert("导入失败：JSON 格式不正确或结构不匹配。");
      }
    });

    render();
  </script>
</body>
</html>
