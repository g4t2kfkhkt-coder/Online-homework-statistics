<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>作业统计（14班 / 9班）</title>
  <style>
    :root{
      --bg:#0b1220; --card:#111a2e; --muted:#93a4c7; --text:#eaf0ff;
      --line:rgba(255,255,255,.12);
      --good:#22c55e; --circle:#60a5fa; --tri:#a78bfa; --blank:#94a3b8;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius:16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:var(--sans); color:var(--text);
      background: radial-gradient(1200px 800px at 10% 10%, #1b2b55 0%, rgba(27,43,85,0) 55%),
                  radial-gradient(900px 700px at 90% 20%, #2c165c 0%, rgba(44,22,92,0) 60%),
                  var(--bg);
      min-height:100vh;
    }
    .wrap{max-width:1200px; margin:0 auto; padding:14px;}
    header{
      display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between;
      margin-bottom:10px;
    }
    .left, .right{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .brand{display:flex; flex-direction:column; gap:4px;}
    .brand h1{margin:0; font-size:16px;}
    .brand .sub{font-size:12px; color:var(--muted); line-height:1.4}
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:10px;
    }
    .tabs{
      display:flex; gap:8px; padding:6px; border-radius:999px; border:1px solid var(--line);
      background: rgba(255,255,255,.04);
    }
    .tab{
      border:none; cursor:pointer; color:var(--text);
      background: transparent; padding:9px 12px; border-radius:999px; font-weight:800;
      user-select:none; touch-action:manipulation;
    }
    .tab.active{background: rgba(255,255,255,.10)}
    input[type="date"], select{
      background: rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:var(--text);
      padding:9px 10px;
      border-radius:12px;
      outline:none;
      font-size:14px;
    }
    button{
      background: rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:var(--text);
      padding:9px 10px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
      user-select:none;
      touch-action:manipulation;
    }
    button:hover{background: rgba(255,255,255,.10)}
    button.danger{background: rgba(239,68,68,.14); border-color: rgba(239,68,68,.35)}
    button.primary{background: rgba(34,197,94,.16); border-color: rgba(34,197,94,.35)}
    .grid4{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    @media (min-width: 900px){
      .grid4{grid-template-columns:1fr 1fr;}
    }
    .panelTitle{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:8px;
    }
    .panelTitle .name{font-weight:900}
    .panelTitle .hint{font-size:12px; color:var(--muted)}
    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      overflow:hidden;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.02);
    }
    thead th{
      background: rgba(255,255,255,.05);
      color: var(--muted);
      text-align:center;
      font-size:12px;
      padding:8px 6px;
      border-bottom:1px solid var(--line);
      position:sticky; top:0;
    }
    tbody td{
      padding:8px 6px;
      border-bottom:1px solid rgba(255,255,255,.06);
      text-align:center;
      font-size:14px;
      vertical-align:middle;
    }
    tbody tr:last-child td{border-bottom:none}
    .id{font-family:var(--mono); letter-spacing:.3px; color:var(--text)}
    .status{
      font-weight:1000;
      font-size:18px;          /* 平板上更好点 */
      line-height:1;
      padding:10px 0;          /* 点击面积更大 */
      cursor:pointer;
      border-radius:10px;
      user-select:none;
      touch-action:manipulation;
      border:1px dashed rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
    }
    .status:hover{background: rgba(255,255,255,.06)}
    .s-blank{color:var(--blank)}
    .s-check{color:var(--good)}
    .s-circle{color:var(--circle)}
    .s-tri{color:var(--tri)}
    .footerLegend{
      margin-top:10px;
      display:flex; flex-wrap:wrap; gap:8px;
      align-items:center; justify-content:space-between;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px; border-radius:999px;
      background: rgba(255,255,255,.05);
      border:1px solid var(--line);
      font-size:12px; color:var(--muted);
    }
    .legendRow{display:flex; gap:8px; flex-wrap:wrap}
    .sep{opacity:.35; padding:0 6px}
    .small{font-size:12px; color:var(--muted)}
    dialog{
      border:none; border-radius:16px; padding:0; width:min(760px, 96vw);
      background: transparent;
    }
    dialog .card{margin:0}
    textarea{
      width:100%; min-height:120px; resize:vertical;
      background: rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:var(--text);
      padding:10px;
      border-radius:12px;
      outline:none;
      font-family:var(--mono);
      font-size:12px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="left">
        <div class="brand">
          <h1>交作业统计（两班 / 按日期）</h1>
          <div class="sub">点击状态格：空白 → ✓ → ○ → △ → 空白（循环）。支持查看过往日期。</div>
        </div>

        <div class="tabs" role="tablist" aria-label="班级切换">
          <button class="tab active" data-class="class14" role="tab">14班</button>
          <button class="tab" data-class="class9" role="tab">9班</button>
        </div>
      </div>

      <div class="right card">
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
          <div>
            <div class="small">日期</div>
            <input id="date" type="date"/>
          </div>
          <div>
            <div class="small">快速跳转历史</div>
            <select id="historySelect">
              <option value="">（选择已有记录日期）</option>
            </select>
          </div>
          <button id="exportJson">导出JSON</button>
          <button id="importJson">导入JSON</button>
          <button id="clearDay" class="danger">清空当日(当前班)</button>
        </div>
      </div>
    </header>

    <div class="grid4">
      <div class="card">
        <div class="panelTitle">
          <div class="name">左上</div>
          <div class="hint">表 1</div>
        </div>
        <div id="panelA"></div>
      </div>

      <div class="card">
        <div class="panelTitle">
          <div class="name">右上</div>
          <div class="hint">表 2</div>
        </div>
        <div id="panelB"></div>
      </div>

      <div class="card">
        <div class="panelTitle">
          <div class="name">左下</div>
          <div class="hint">表 3</div>
        </div>
        <div id="panelC"></div>
      </div>

      <div class="card">
        <div class="panelTitle">
          <div class="name">右下</div>
          <div class="hint">表 4</div>
        </div>
        <div id="panelD"></div>
      </div>
    </div>

    <div class="footerLegend card">
      <div class="legendRow">
        <span class="pill"><b class="s-blank">空白</b><span class="sep">|</span>未交</span>
        <span class="pill"><b class="s-check">✓</b><span class="sep">|</span>已交</span>
        <span class="pill"><b class="s-circle">○</b><span class="sep">|</span>优秀（可按你习惯理解）</span>
        <span class="pill"><b class="s-tri">△</b><span class="sep">|</span>补交（可按你习惯理解）</span>
      </div>
      <div class="small">提示：数据默认存在本机浏览器。建议定期“导出JSON”备份，换设备后可“导入JSON”。</div>
    </div>

    <!-- 导入 JSON 弹窗 -->
    <dialog id="dlgImport">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
          <h2 style="margin:0; font-size:16px;">导入JSON（覆盖或合并）</h2>
          <button id="closeImport">关闭</button>
        </div>
        <div class="small" style="margin-top:6px; line-height:1.5;">
          把之前导出的 JSON 粘贴进来。导入会<b>合并</b>到现有数据（同一天同学号以导入为准）。
        </div>
        <div style="margin-top:10px;">
          <textarea id="importBox" placeholder='粘贴 JSON...'></textarea>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
          <button id="doImport" class="primary">导入并刷新</button>
        </div>
      </div>
    </dialog>

  </div>

  <script>
    /***********************
     * 数据结构（localStorage）
     * key: hw_tracker_v3
     * store = {
     *   classes: {
     *     class14: { dates: { "2026-03-02": { A:{1:0..3}, B:{}, C:{}, D:{} } } },
     *     class9:  { dates: { ... } }
     *   }
     * }
     ************************/
    const STORE_KEY = "hw_tracker_v3";
    const STUDENTS = Array.from({length:50}, (_,i)=> String(i+1)); // 1..50
    const SHEETS = ["A","B","C","D"]; // 四个表：左上/右上/左下/右下
    const CYCLE = ["", "✓", "○", "△"]; // 空白 → ✓ → ○ → △ → 空白
    const CLASS_LABEL = { class14:"14班", class9:"9班" };

    const elDate = document.getElementById("date");
    const elHistory = document.getElementById("historySelect");
    const tabs = document.querySelectorAll(".tab");

    const panels = {
      A: document.getElementById("panelA"),
      B: document.getElementById("panelB"),
      C: document.getElementById("panelC"),
      D: document.getElementById("panelD")
    };

    function todayISO(){
      const d = new Date();
      const off = d.getTimezoneOffset();
      const local = new Date(d.getTime() - off*60000);
      return local.toISOString().slice(0,10);
    }

    function loadStore(){
      try{
        const raw = localStorage.getItem(STORE_KEY);
        return raw ? JSON.parse(raw) : null;
      }catch(e){ return null; }
    }
    function saveStore(store){
      localStorage.setItem(STORE_KEY, JSON.stringify(store));
    }
    function ensureStore(){
      let s = loadStore();
      if(!s){
        s = { classes: { class14:{dates:{}}, class9:{dates:{}} } };
        saveStore(s);
      }
      if(!s.classes) s.classes = { class14:{dates:{}}, class9:{dates:{}} };
      if(!s.classes.class14) s.classes.class14 = {dates:{}};
      if(!s.classes.class9) s.classes.class9 = {dates:{}};
      if(!s.classes.class14.dates) s.classes.class14.dates = {};
      if(!s.classes.class9.dates) s.classes.class9.dates = {};
      return s;
    }

    let store = ensureStore();
    let currentClass = "class14";

    function getDay(){
      return elDate.value || todayISO();
    }

    function ensureDayRecord(cls, day){
      const c = store.classes[cls];
      if(!c.dates[day]){
        c.dates[day] = { A:{}, B:{}, C:{}, D:{} };
      }else{
        // 确保四张表都存在
        for(const k of SHEETS){
          if(!c.dates[day][k]) c.dates[day][k] = {};
        }
      }
      return c.dates[day];
    }

    function getStatusIndex(cls, day, sheet, studentId){
      const rec = ensureDayRecord(cls, day);
      const v = rec[sheet][studentId];
      return (typeof v === "number") ? v : 0; // 0=空白
    }

    function setStatusIndex(cls, day, sheet, studentId, idx){
      const rec = ensureDayRecord(cls, day);
      rec[sheet][studentId] = idx;
      saveStore(store);
    }

    function clearDay(cls, day){
      store.classes[cls].dates[day] = { A:{}, B:{}, C:{}, D:{} };
      saveStore(store);
    }

    function buildTableHTML(cls, day, sheet){
      // 表格结构：5组【学号 作业状态】=10列，10行=1..50
      let html = `<div style="overflow:auto; max-height:520px;">`;
      html += `<table aria-label="${CLASS_LABEL[cls]} ${day} 表${sheet}">`;
      html += `<thead><tr>`;
      for(let g=0; g<5; g++){
        html += `<th>学号</th><th>作业状态</th>`;
      }
      html += `</tr></thead><tbody>`;

      for(let r=0; r<10; r++){
        html += `<tr>`;
        for(let g=0; g<5; g++){
          const id = String(r + 1 + g*10); // 1..10, 11..20, ...
          const idx = getStatusIndex(cls, day, sheet, id);
          const icon = CYCLE[idx] || "";
          const clsName = idx===0 ? "s-blank" : (idx===1 ? "s-check" : (idx===2 ? "s-circle" : "s-tri"));
          html += `<td class="id">${id}</td>`;
          html += `<td>
                    <div class="status ${clsName}"
                      data-class="${cls}"
                      data-date="${day}"
                      data-sheet="${sheet}"
                      data-student="${id}"
                      data-idx="${idx}"
                      title="点击切换：空白→✓→○→△"
                      role="button" aria-label="学号${id} 状态">
                      ${icon}
                    </div>
                  </td>`;
        }
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;
      return html;
    }

    function render(){
      store = ensureStore();
      const day = getDay();

      // 渲染四个面板
      for(const sheet of SHEETS){
        panels[sheet].innerHTML = buildTableHTML(currentClass, day, sheet);
      }

      // 填充历史日期下拉（仅当前班）
      const days = Object.keys(store.classes[currentClass].dates || {}).sort((a,b)=> b.localeCompare(a));
      const keep = elHistory.value;
      elHistory.innerHTML = `<option value="">（选择已有记录日期）</option>` + days.map(d=>`<option value="${d}">${d}</option>`).join("");
      // 尽量保留当前选择
      if(keep && days.includes(keep)) elHistory.value = keep;
    }

    // ===== 事件：班级切换 =====
    tabs.forEach(btn=>{
      btn.addEventListener("click", ()=>{
        tabs.forEach(x=>x.classList.remove("active"));
        btn.classList.add("active");
        currentClass = btn.dataset.class;
        render();
      });
    });

    // ===== 事件：日期与历史 =====
    elDate.value = todayISO();
    elDate.addEventListener("change", ()=> render());
    elHistory.addEventListener("change", ()=>{
      if(elHistory.value){
        elDate.value = elHistory.value;
        render();
      }
    });

    // ===== 事件：点击状态格（事件委托，四表通用）=====
    document.addEventListener("click", (e)=>{
      const t = e.target.closest?.(".status");
      if(!t) return;
      const cls = t.dataset.class;
      const day = t.dataset.date;
      const sheet = t.dataset.sheet;
      const student = t.dataset.student;
      const idx = parseInt(t.dataset.idx || "0", 10);
      const next = (idx + 1) % CYCLE.length; // 0->1->2->3->0
      setStatusIndex(cls, day, sheet, student, next);

      // 局部更新（不用整页重绘也能快）
      t.dataset.idx = String(next);
      t.textContent = CYCLE[next];
      t.classList.remove("s-blank","s-check","s-circle","s-tri");
      t.classList.add(next===0 ? "s-blank" : next===1 ? "s-check" : next===2 ? "s-circle" : "s-tri");
    });

    // ===== 清空当日（当前班）=====
    document.getElementById("clearDay").addEventListener("click", ()=>{
      const day = getDay();
      clearDay(currentClass, day);
      render();
    });

    // ===== 导出 JSON（全部班级/全部日期）=====
    function download(filename, content, type="application/json;charset=utf-8"){
      const blob = new Blob([content], {type});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById("exportJson").addEventListener("click", ()=>{
      const payload = ensureStore();
      const name = `作业统计_两班_全部日期.json`;
      download(name, JSON.stringify(payload, null, 2));
    });

    // ===== 导入 JSON（合并）=====
    const dlg = document.getElementById("dlgImport");
    document.getElementById("importJson").addEventListener("click", ()=>{
      document.getElementById("importBox").value = "";
      dlg.showModal();
    });
    document.getElementById("closeImport").addEventListener("click", ()=> dlg.close());

    document.getElementById("doImport").addEventListener("click", ()=>{
      try{
        const text = document.getElementById("importBox").value.trim();
        if(!text) return;
        const incoming = JSON.parse(text);

        // 合并逻辑：classes -> class14/class9 -> dates -> day -> A/B/C/D -> studentId
        const base = ensureStore();
        if(incoming?.classes){
          for(const cls of ["class14","class9"]){
            const inC = incoming.classes[cls];
            if(!inC?.dates) continue;
            if(!base.classes[cls]) base.classes[cls] = {dates:{}};
            if(!base.classes[cls].dates) base.classes[cls].dates = {};
            for(const day of Object.keys(inC.dates)){
              if(!base.classes[cls].dates[day]) base.classes[cls].dates[day] = {A:{},B:{},C:{},D:{}};
              const dayRec = inC.dates[day] || {};
              for(const sheet of SHEETS){
                if(!base.classes[cls].dates[day][sheet]) base.classes[cls].dates[day][sheet] = {};
                const inSheet = dayRec[sheet] || {};
                for(const sid of Object.keys(inSheet)){
                  const v = inSheet[sid];
                  if(typeof v === "number") base.classes[cls].dates[day][sheet][sid] = v;
                }
              }
            }
          }
        }

        store = base;
        saveStore(store);
        dlg.close();
        render();
      }catch(err){
        alert("导入失败：JSON 格式不正确或结构不匹配。");
      }
    });

    // 首次渲染
    render();
  </script>
</body>
</html>
